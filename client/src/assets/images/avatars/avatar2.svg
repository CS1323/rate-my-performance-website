<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <!-- Hockey Stick blade (bottom) -->
  <rect x="42" y="50" width="16" height="28" fill="#8B4513" rx="2"/>
  <!-- Stick blade curve -->
  <path d="M 42 65 Q 35 70 42 75" fill="#8B4513"/>
  <!-- Hockey Stick shaft -->
  <rect x="47" y="20" width="6" height="35" fill="#D2691E"/>
  <!-- Grip tape on shaft -->
  <g opacity="0.3">
    <line x1="47" y1="25" x2="53" y2="25" stroke="#000" stroke-width="0.5"/>
    <line x1="47" y1="30" x2="53" y2="30" stroke="#000" stroke-width="0.5"/>
    <line x1="47" y1="35" x2="53" y2="35" stroke="#000" stroke-width="0.5"/>
    <line x1="47" y1="40" x2="53" y2="40" stroke="#000" stroke-width="0.5"/>
  </g>
  <!-- Stick handle knob -->
  <circle cx="50" cy="18" r="3" fill="#8B4513"/>
</svg>