<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <!-- Left Skate boot -->
  <rect x="25" y="40" width="16" height="20" fill="#1a1a1a" rx="3"/>
  <!-- Left Skate blade -->
  <rect x="22" y="60" width="22" height="3" fill="#888"/>
  <!-- Left Skate blade edge -->
  <line x1="22" y1="60" x2="44" y2="60" stroke="#555" stroke-width="1"/>
  <!-- Right Skate boot -->
  <rect x="59" y="40" width="16" height="20" fill="#1a1a1a" rx="3"/>
  <!-- Right Skate blade -->
  <rect x="56" y="60" width="22" height="3" fill="#888"/>
  <!-- Right Skate blade edge -->
  <line x1="56" y1="60" x2="78" y2="60" stroke="#555" stroke-width="1"/>
  <!-- Laces on left boot -->
  <g opacity="0.5">
    <line x1="28" y1="45" x2="36" y2="45" stroke="#FFF" stroke-width="1"/>
    <line x1="28" y1="50" x2="36" y2="50" stroke="#FFF" stroke-width="1"/>
    <line x1="28" y1="55" x2="36" y2="55" stroke="#FFF" stroke-width="1"/>
  </g>
  <!-- Laces on right boot -->
  <g opacity="0.5">
    <line x1="64" y1="45" x2="72" y2="45" stroke="#FFF" stroke-width="1"/>
    <line x1="64" y1="50" x2="72" y2="50" stroke="#FFF" stroke-width="1"/>
    <line x1="64" y1="55" x2="72" y2="55" stroke="#FFF" stroke-width="1"/>
  </g>
</svg>